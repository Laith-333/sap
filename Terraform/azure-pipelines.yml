name: Terraform Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      target_secret:
        description: "Which secret to update"
        required: true
        type: choice
        options:
          - pipelines
          - microsoft
          - jumbo

      secret_value:
        description: "Paste value (optional)"
        required: false

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="target_secret=${{ github.event.inputs.target_secret }}" \
            -var="secret_value=${{ github.event.inputs.secret_value }}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="target_secret=${{ github.event.inputs.target_secret }}" \
            -var="secret_value=${{ github.event.inputs.secret_value }}"
