name: Terraform Deploy (Key Vault Config)

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: "Server name"
        required: true

      server_ip:
        description: "Server IP"
        required: true

      network:
        description: "Network"
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network

jobs:
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 📄 Create JSON config
      - name: Create config JSON
        run: |
          echo '{
            "server_name": "${{ github.event.inputs.server_name }}",
            "server_ip": "${{ github.event.inputs.server_ip }}",
            "network": "${{ github.event.inputs.network }}"
          }' > config.json

          echo "CONFIG<<EOF" >> $GITHUB_ENV
          cat config.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🚀 Init
      - name: Terraform Init
        run: terraform init

      # 🔍 Plan (NO var issues anymore)
      - name: Terraform Plan
        env:
          TF_VAR_server_config: ${{ env.CONFIG }}
        run: terraform plan

      # 🚀 Apply
      - name: Terraform Apply
        env:
          TF_VAR_server_config: ${{ env.CONFIG }}
        run: terraform apply -auto-approve
