name: Terraform Deploy (Key Vault Config)

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "New client or existing?"
        required: true
        type: choice
        options:
          - use_existing_file
          - create_new

      target_secret:
        description: "Which client?"
        required: true
        type: choice
        options:
          - pipelines
          - microsoft
          - jumbo

      secret_value:
        description: "Paste config (only for new client)"
        required: false

jobs:
  terraform:
    name: Run Terraform Deployment
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    env:
      # 🔐 Azure auth
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      # ✅ Terraform variables (fixes your issue)
      TF_VAR_action: ${{ github.event.inputs.action || 'use_existing_file' }}
      TF_VAR_target_secret: ${{ github.event.inputs.target_secret || 'pipelines' }}
      TF_VAR_secret_value: ${{ github.event.inputs.secret_value || '' }}

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🚀 Init
      - name: Terraform Init
        run: terraform init

      # 🔍 Plan
      - name: Terraform Plan
        run: terraform plan

      # 🚀 Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve
