name: Use Existing Client (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Existing Client Name (e.g. sap)"
        required: true

jobs:
  use-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 📋 Show available clients
      - name: List clients
        run: |
          echo "📋 Available clients:"
          az keyvault secret list \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --query "[].name" -o tsv | grep '^client-' || echo "No clients found"

      # 🧠 Generate name
      - name: Generate secret name
        id: naming
        run: |
          RAW="client-${{ github.event.inputs.client_name }}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT

      # 🔍 Load config
      - name: Load config
        run: |
          az keyvault secret show \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --query value -o tsv > config.json

          echo "📄 Loaded config:"
          cat config.json
