name: Create Client + SAP Router Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Container / Server IP Address"
        required: true

      container_port:
        description: "Container Port (e.g. 3200, 8080)"
        required: true
        default: "80"

      saprouttab:
        description: "SAP Router rules (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP address"
            exit 1
          fi

      # 🔍 Validate Port
      - name: Validate Port
        run: |
          PORT="${{ github.event.inputs.container_port }}"
          if ! [[ $PORT =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "❌ Invalid port number (must be 1-65535)"
            exit 1
          fi

      # 🧠 Generate secret names
      - name: Generate secret names
        id: naming
        run: |
          INPUT="${{ github.event.inputs.client_name }}"
          CLEAN=$(echo "$INPUT" | sed 's/^client-//')

          SAFE=$(echo "client-$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-$//')

          ROUTER="saprouttab-$CLEAN"

          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER" >> $GITHUB_OUTPUT

      # 📄 Create config.json
      - name: Create config.json
        id: config
        run: |
          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"
          PORT="${{ github.event.inputs.container_port }}"

          # Generate container name
          CONTAINER_NAME="container-${CLIENT}"

          jq -n \
            --arg client "$CLIENT" \
            --arg cname "$CONTAINER_NAME" \
            --arg ip "$IP" \
            --arg port "$PORT" \
            '{
              client_name: $client,
              container_name: $cname,
              container_ip: $ip,
              port: $port
            }' > config.json

          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "container=$CONTAINER_NAME" >> $GITHUB_OUTPUT

          echo "✅ Generated config:"
          cat config.json

      # 🔥 Check if saprouter file exists
      - name: Check saprouter file
        id: saprouter_check
        run: |
          FILE="saprouter_temp/saprouttab"
          
          if [ -f "$FILE" ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Found: $FILE"
            echo "Lines:"
            wc -l "$FILE"
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ File not found: $FILE (will skip upload)"
          fi

      # 📊 SHOW RESULT IN LOGS
      - name: Show Result
        run: |
          echo "=============================="
          echo "CLIENT: ${{ github.event.inputs.client_name }}"
          echo "CONTAINER: ${{ steps.config.outputs.container }}"
          echo "IP: ${{ github.event.inputs.server_ip }}"
          echo "PORT: ${{ steps.config.outputs.port }}"
          if [ "${{ steps.saprouter_check.outputs.file_exists }}" = "true" ]; then
            echo "SAPROUTER FILE: EXISTS ✅"
          else
            echo "SAPROUTER FILE: NOT FOUND (will skip) ⏭️"
          fi
          echo "=============================="

      # 🧾 GitHub Summary (Nice UI)
      - name: Write Summary
        run: |
          echo "## ✅ Client Configuration Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client | ${{ github.event.inputs.client_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ steps.config.outputs.container }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IP | ${{ github.event.inputs.server_ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Port | ${{ steps.config.outputs.port }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.saprouter_check.outputs.file_exists }}" = "true" ]; then
            echo "| SAP Router | File found and uploaded |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SAP Router | File not found (skipped) |" >> $GITHUB_STEP_SUMMARY
          fi

      # 🔐 Upload client config
      - name: Upload client config
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json \
            --only-show-errors
          echo "✅ Uploaded: ${{ steps.naming.outputs.secret_name }}"

      # 🔐 Check if saprouter file exists before upload (FAIL if missing)
      - name: Verify saprouter file exists
        run: |
          FILE="saprouter_temp/saprouttab"
          if [ ! -f "$FILE" ]; then
            echo "❌ ERROR: SAP Router file not found: $FILE"
            echo ""
            echo "This file is required. Please commit it to the repository:"
            echo "  Path: saprouter_temp/saprouttab"
            echo ""
            echo "Available files in repo:"
            find . -type f -name "*saprouttab*" -o -name "*router*" 2>/dev/null | head -5 || echo "  (none found)"
            exit 1
          fi

      # 🔐 Upload saprouttab
      - name: Upload saprouttab
        run: |
          FILE="saprouter_temp/saprouttab"
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file "$FILE" \
            --only-show-errors
          echo "✅ Uploaded: ${{ steps.naming.outputs.router_name }}""

      # 🧹 Cleanup
      - name: Cleanup runner files
        run: |
          rm -f config.json
          echo "✅ Cleaned up temporary files"
