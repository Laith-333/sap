name: Create Client + SAP Router Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Server IP Address"
        required: true

      network:
        description: "Network / Subnet"
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network

      service:
        description: "Service Type (web, db, api, etc.)"
        required: true
        default: "web"

      saprouttab:
        description: |
          SAP Router rules (optional)
          Example:
          P 10.0.0.1 192.168.1.10 3299
          D * * *
        required: false

permissions:
  contents: read

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP"
            exit 1
          fi

      # 🧠 Generate CLEAN secret name (FIXED)
      - name: Generate secret name
        id: naming
        run: |
          INPUT="${{ github.event.inputs.client_name }}"

          CLEAN=$(echo "$INPUT" | sed 's/^client-//')

          SAFE=$(echo "client-$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-$//')

          ROUTER="saprouttab-$CLEAN"

          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER" >> $GITHUB_OUTPUT

          echo "Client secret: $SAFE"
          echo "Router secret: $ROUTER"

      # 📄 Create main config JSON
      - name: Create config.json
        run: |
          jq -n \
            --arg client "${{ github.event.inputs.client_name }}" \
            --arg ip "${{ github.event.inputs.server_ip }}" \
            --arg net "${{ github.event.inputs.network }}" \
            --arg svc "${{ github.event.inputs.service }}" \
            '{
              client_name: $client,
              server_ip: $ip,
              network: $net,
              service: $svc
            }' > config.json

          echo "Generated config:"
          cat config.json

      # 🔥 Create SAP Router config (SMART)
      - name: Create saprouttab
        run: |
          INPUT="${{ github.event.inputs.saprouttab }}"
          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"

          if [ -z "$INPUT" ]; then
            echo "⚠️ No custom SAP rules → using default"

            cat <<EOF > saprouttab
# SAP Router Rules for $CLIENT
P $IP * *
EOF

          else
            echo "✅ Using custom SAP rules"
            echo "$INPUT" > saprouttab
          fi

          echo "Generated saprouttab:"
          cat saprouttab

      # 🔐 Upload client config
      - name: Upload client config
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json

      # 🔐 Upload SAP router config
      - name: Upload saprouttab
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file saprouttab

          echo "✅ Client + SAP Router uploaded successfully"
