name: Create Client + SAP Router Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true
        type: string

      server_ip:
        description: "Container / Server IP Address"
        required: true
        type: string

      container_port:
        description: "Container Port (e.g. 3200, 8080)"
        required: true
        default: "80"
        type: string

      saprouter_file_path:
        description: "Path to saprouttab file in repo"
        required: false
        default: "saprouter_temp/saprouttab"
        type: string

      saprouttab:
        description: "Optional SAP Router rules text fallback"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Validate IP
        shell: bash
        run: |
          set -euo pipefail
          IP="${{ github.event.inputs.server_ip }}"

          if ! [[ "$IP" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "Invalid IP address format"
            exit 1
          fi

          IFS='.' read -r o1 o2 o3 o4 <<< "$IP"
          for octet in "$o1" "$o2" "$o3" "$o4"; do
            if [ "$octet" -lt 0 ] || [ "$octet" -gt 255 ]; then
              echo "Invalid IP address"
              exit 1
            fi
          done

      - name: Validate Port
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ github.event.inputs.container_port }}"
          if ! [[ "$PORT" =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "Invalid port number"
            exit 1
          fi

      - name: Generate secret names
        id: naming
        shell: bash
        run: |
          set -euo pipefail

          INPUT="${{ github.event.inputs.client_name }}"

          CLEAN=$(echo "$INPUT" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/^client-//' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')

          SECRET_NAME="client-${CLEAN}"
          ROUTER_NAME="saprouttab-${CLEAN}"
          CONTAINER_NAME="container-${CLEAN}"

          echo "secret_name=$SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "router_name=$ROUTER_NAME" >> "$GITHUB_OUTPUT"
          echo "container_name=$CONTAINER_NAME" >> "$GITHUB_OUTPUT"

      - name: Create temp config file
        id: tempfiles
        shell: bash
        run: |
          set -euo pipefail
          CONFIG_FILE="$(mktemp)"
          ROUTER_INPUT_FILE="$(mktemp)"

          echo "config_file=$CONFIG_FILE" >> "$GITHUB_OUTPUT"
          echo "router_input_file=$ROUTER_INPUT_FILE" >> "$GITHUB_OUTPUT"

      - name: Create config.json
        shell: bash
        run: |
          set -euo pipefail

          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"
          PORT="${{ github.event.inputs.container_port }}"
          CONTAINER="${{ steps.naming.outputs.container_name }}"
          CONFIG_FILE="${{ steps.tempfiles.outputs.config_file }}"

          jq -n \
            --arg client "$CLIENT" \
            --arg cname "$CONTAINER" \
            --arg ip "$IP" \
            --arg port "$PORT" \
            '{
              client_name: $client,
              container_name: $cname,
              container_ip: $ip,
              port: $port
            }' > "$CONFIG_FILE"

      - name: Create fallback saprouttab temp file
        if: ${{ github.event.inputs.saprouttab != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${{ github.event.inputs.saprouttab }}" > "${{ steps.tempfiles.outputs.router_input_file }}"

      - name: Resolve SAP router file source
        id: routerfile
        shell: bash
        run: |
          set -euo pipefail

          REPO_FILE="${{ github.event.inputs.saprouter_file_path }}"
          INPUT_FILE="${{ steps.tempfiles.outputs.router_input_file }}"

          if [ -n "$REPO_FILE" ] && [ -f "$REPO_FILE" ]; then
            echo "Using SAP router file from repo path: $REPO_FILE"
            echo "resolved_file=$REPO_FILE" >> "$GITHUB_OUTPUT"
            echo "source=repo" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -s "$INPUT_FILE" ]; then
            echo "Repo file not found, using SAP router rules from workflow input"
            echo "resolved_file=$INPUT_FILE" >> "$GITHUB_OUTPUT"
            echo "source=input" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ERROR: No SAP router file found."
          echo "Checked repo path: $REPO_FILE"
          echo "Also no saprouttab input was provided."
          echo "Provide a valid repo path or paste saprouttab content."
          exit 1

      - name: Delete existing saprouttab from repo if it exists
        shell: bash
        run: |
          REPO_FILE="saprouter_temp/saprouttab"
          
          if [ -f "$REPO_FILE" ]; then
            echo "Deleting existing saprouttab file: $REPO_FILE"
            rm -f "$REPO_FILE"
          else
            echo "No existing saprouttab file found at: $REPO_FILE"
          fi

      - name: Upload client config to Key Vault
        shell: bash
        run: |
          set -euo pipefail
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file "${{ steps.tempfiles.outputs.config_file }}" \
            --only-show-errors 1>/dev/null

      - name: Upload saprouttab to Key Vault
        shell: bash
        run: |
          set -euo pipefail
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file "${{ steps.routerfile.outputs.resolved_file }}" \
            --only-show-errors 1>/dev/null

      - name: Write safe summary
        shell: bash
        run: |
          {
            echo "## Configuration uploaded"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Client | ${{ github.event.inputs.client_name }} |"
            echo "| Container | ${{ steps.naming.outputs.container_name }} |"
            echo "| Config secret | ${{ steps.naming.outputs.secret_name }} |"
            echo "| Router secret | ${{ steps.naming.outputs.router_name }} |"
            echo "| Router source | ${{ steps.routerfile.outputs.source }} |"
            echo "| Router repo path input | ${{ github.event.inputs.saprouter_file_path }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup temp files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ steps.tempfiles.outputs.config_file }}"
          rm -f "${{ steps.tempfiles.outputs.router_input_file }}"
