name: Create Config + Store in Key Vault + Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server/Config name'
        required: true
        type: string
      server_ip:
        description: 'Server IP address'
        required: true
        type: string
      network:
        description: 'Network/Subnet'
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP"
            exit 1
          fi

      # 🧠 Generate secret name
      - name: Generate secret name
        id: naming
        run: |
          RAW="config-${{ github.event.inputs.server_name }}-${{ github.event.inputs.environment }}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT

      # 📄 Create config JSON
      - name: Create config
        run: |
          jq -n \
            --arg name "${{ github.event.inputs.server_name }}" \
            --arg ip "${{ github.event.inputs.server_ip }}" \
            --arg net "${{ github.event.inputs.network }}" \
            --arg env "${{ github.event.inputs.environment }}" \
            '{
              server_name: $name,
              server_ip: $ip,
              network: $net,
              environment: $env
            }' > config.json

          cat config.json

      # 🔐 Store in Key Vault
      - name: Store in Key Vault
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json

      # 🔄 Retrieve config for Terraform
      - name: Get config from Key Vault
        run: |
          CONFIG=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --query value -o tsv)

          echo "::add-mask::$CONFIG"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: Terraform

      # 🔥 Pass config into Terraform
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="server_config=$CONFIG" \
            -var="environment=${{ github.event.inputs.environment }}"
        working-directory: Terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="server_config=$CONFIG" \
            -var="environment=${{ github.event.inputs.environment }}"
        working-directory: Terraform
