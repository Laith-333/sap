name: Create Client + SAP Router Config (Key Vault + File Upload)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Container / Server IP Address"
        required: true

      container_port:
        description: "Container Port (e.g. 3200, 8080)"
        required: true
        default: "80"

      saprouttab:
        description: "SAP Router rules (optional)"
        required: false
        default: ""

      custom_file_name:
        description: "Secret name for custom file (optional, e.g. app-config)"
        required: false
        default: ""

      custom_file_content:
        description: "Custom file content to upload to Key Vault (JSON, YAML, or plain text)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP address"
            exit 1
          fi

      # 🔍 Validate Port
      - name: Validate Port
        run: |
          PORT="${{ github.event.inputs.container_port }}"
          if ! [[ $PORT =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "❌ Invalid port number (must be 1-65535)"
            exit 1
          fi

      # 🧠 Generate secret names
      - name: Generate secret names
        id: naming
        run: |
          INPUT="${{ github.event.inputs.client_name }}"
          CLEAN=$(echo "$INPUT" | sed 's/^client-//')

          SAFE=$(echo "client-$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-$//')

          ROUTER="saprouttab-$CLEAN"

          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER" >> $GITHUB_OUTPUT

      # 📄 Create config.json
      - name: Create config.json
        id: config
        run: |
          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"
          PORT="${{ github.event.inputs.container_port }}"

          # Generate container name
          CONTAINER_NAME="container-${CLIENT}"

          jq -n \
            --arg client "$CLIENT" \
            --arg cname "$CONTAINER_NAME" \
            --arg ip "$IP" \
            --arg port "$PORT" \
            '{
              client_name: $client,
              container_name: $cname,
              container_ip: $ip,
              port: $port
            }' > config.json

          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "container=$CONTAINER_NAME" >> $GITHUB_OUTPUT

          echo "✅ Generated config:"
          cat config.json

      # 📄 Create custom file (if provided)
      - name: Create custom file
        id: custom_file
        run: |
          CUSTOM_NAME="${{ github.event.inputs.custom_file_name }}"
          CUSTOM_CONTENT="${{ github.event.inputs.custom_file_content }}"

          if [ -n "$CUSTOM_NAME" ] && [ -n "$CUSTOM_CONTENT" ]; then
            # Create a temporary file with custom content
            echo "$CUSTOM_CONTENT" > custom_upload.txt

            echo "file_created=true" >> $GITHUB_OUTPUT
            echo "file_name=$CUSTOM_NAME" >> $GITHUB_OUTPUT
            echo "✅ Custom file prepared: $CUSTOM_NAME"
            echo "Content preview:"
            head -c 200 custom_upload.txt
            echo ""
          else
            echo "file_created=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No custom file provided"
          fi

      # 📊 SHOW RESULT IN LOGS
      - name: Show Result
        run: |
          echo "=============================="
          echo "CLIENT: ${{ github.event.inputs.client_name }}"
          echo "CONTAINER: ${{ steps.config.outputs.container }}"
          echo "IP: ${{ github.event.inputs.server_ip }}"
          echo "PORT: ${{ steps.config.outputs.port }}"
          if [ "${{ steps.custom_file.outputs.file_created }}" = "true" ]; then
            echo "CUSTOM FILE: ${{ steps.custom_file.outputs.file_name }} ✅"
          fi
          echo "=============================="

      # 🧾 GitHub Summary (Nice UI)
      - name: Write Summary
        run: |
          echo "## ✅ Client Configuration Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client | ${{ github.event.inputs.client_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ steps.config.outputs.container }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IP | ${{ github.event.inputs.server_ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Port | ${{ steps.config.outputs.port }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.custom_file.outputs.file_created }}" = "true" ]; then
            echo "| Custom File | ${{ steps.custom_file.outputs.file_name }} |" >> $GITHUB_STEP_SUMMARY
          fi

      # 🔥 Prepare SAP Router
      - name: Prepare saprouttab
        run: |
          FILE="saprouter_temp/saprouttab"
          INPUT="${{ github.event.inputs.saprouttab }}"
          IP="${{ github.event.inputs.server_ip }}"

          if [ -f "$FILE" ]; then
            cp "$FILE" saprouttab
          elif [ -n "$INPUT" ]; then
            echo "$INPUT" > saprouttab
          else
            echo "P $IP * *" > saprouttab
          fi

      # 🔐 Upload client config
      - name: Upload client config
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json \
            --only-show-errors
          echo "✅ Uploaded: ${{ steps.naming.outputs.secret_name }}"

      # 🔐 Upload saprouttab
      - name: Upload saprouttab
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file saprouttab \
            --only-show-errors
          echo "✅ Uploaded: ${{ steps.naming.outputs.router_name }}"

      # 🔐 Upload custom file (if provided)
      - name: Upload custom file
        if: steps.custom_file.outputs.file_created == 'true'
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.custom_file.outputs.file_name }}" \
            --file custom_upload.txt \
            --only-show-errors
          echo "✅ Uploaded custom file: ${{ steps.custom_file.outputs.file_name }}"

      # 🧹 Cleanup
      - name: Cleanup runner files
        run: rm -f config.json saprouttab custom_upload.txt

      # 🔥 Delete sensitive file from repo
      - name: Delete saprouter_temp/saprouttab from repo
        run: |
          FILE="saprouter_temp/saprouttab"

          if [ -f "$FILE" ]; then
            SHA=$(git ls-files -s $FILE | awk '{print $2}')

            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/contents/$FILE \
              -d "{
                \"message\": \"remove sensitive saprouter_temp/saprouttab\",
                \"sha\": \"$SHA\",
                \"branch\": \"${{ github.ref_name }}\"
              }"
          fi
