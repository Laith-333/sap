name: Create Client + SAP Router Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Container / Server IP Address"
        required: true

      container_port:
        description: "Container Port (e.g. 3200, 8080)"
        required: true
        default: "80"

      saprouttab:
        description: "SAP Router rules (optional)"
        required: false
        default: ""

      config_file:
        description: "Path to custom config file (optional, e.g. configs/app.json)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP address"
            exit 1
          fi

      # 🔍 Validate Port
      - name: Validate Port
        run: |
          PORT="${{ github.event.inputs.container_port }}"
          if ! [[ $PORT =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "❌ Invalid port number (must be 1-65535)"
            exit 1
          fi

      # 🔍 Validate config file exists (if provided)
      - name: Validate config file
        id: validate_config
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file }}"
          
          if [ -n "$CONFIG_FILE" ]; then
            if [ ! -f "$CONFIG_FILE" ]; then
              echo "❌ ERROR: Config file not found: $CONFIG_FILE"
              echo "Available files in repo:"
              find . -type f -name "*.json" -o -name "*.yaml" -o -name "*.yml" | head -10
              exit 1
            fi
            echo "config_provided=true" >> $GITHUB_OUTPUT
            echo "✅ Config file found: $CONFIG_FILE"
          else
            echo "config_provided=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No config file provided"
          fi

      # 🧠 Generate secret names
      - name: Generate secret names
        id: naming
        run: |
          INPUT="${{ github.event.inputs.client_name }}"
          CLEAN=$(echo "$INPUT" | sed 's/^client-//')

          SAFE=$(echo "client-$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-$//')

          ROUTER="saprouttab-$CLEAN"

          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER" >> $GITHUB_OUTPUT

      # 📄 Create config.json
      - name: Create config.json
        id: config
        run: |
          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"
          PORT="${{ github.event.inputs.container_port }}"

          # Generate container name
          CONTAINER_NAME="container-${CLIENT}"

          jq -n \
            --arg client "$CLIENT" \
            --arg cname "$CONTAINER_NAME" \
            --arg ip "$IP" \
            --arg port "$PORT" \
            '{
              client_name: $client,
              container_name: $cname,
              container_ip: $ip,
              port: $port
            }' > config.json

          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "container=$CONTAINER_NAME" >> $GITHUB_OUTPUT

          echo "✅ Generated config:"
          cat config.json

      # 🔥 Prepare SAP Router (with strict error handling)
      - name: Prepare saprouttab
        id: saprouter
        run: |
          FILE="saprouter_temp/saprouttab"
          INPUT="${{ github.event.inputs.saprouttab }}"
          IP="${{ github.event.inputs.server_ip }}"

          # Check if file exists in repo
          if [ -f "$FILE" ]; then
            echo "✅ Found file: $FILE"
            cp "$FILE" saprouttab
            echo "source=file" >> $GITHUB_OUTPUT
            echo "File copied successfully"
          elif [ -n "$INPUT" ]; then
            echo "✅ Using input text"
            echo "$INPUT" > saprouttab
            echo "source=input" >> $GITHUB_OUTPUT
          else
            echo "✅ Creating default route"
            echo "P $IP * *" > saprouttab
            echo "source=default" >> $GITHUB_OUTPUT
          fi

          # Verify saprouttab was created
          if [ ! -f "saprouttab" ]; then
            echo "❌ ERROR: saprouttab file was not created"
            exit 1
          fi
          
          echo "✅ saprouttab ready:"
          cat saprouttab

      # 📊 SHOW RESULT IN LOGS
      - name: Show Result
        run: |
          echo "=============================="
          echo "CLIENT: ${{ github.event.inputs.client_name }}"
          echo "CONTAINER: ${{ steps.config.outputs.container }}"
          echo "IP: ${{ github.event.inputs.server_ip }}"
          echo "PORT: ${{ steps.config.outputs.port }}"
          echo "SAPROUTTAB SOURCE: ${{ steps.saprouter.outputs.source }}"
          if [ "${{ steps.validate_config.outputs.config_provided }}" = "true" ]; then
            echo "CONFIG FILE: ${{ github.event.inputs.config_file }} ✅"
          fi
          echo "=============================="

      # 🧾 GitHub Summary (Nice UI)
      - name: Write Summary
        run: |
          echo "## ✅ Client Configuration Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client | ${{ github.event.inputs.client_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ steps.config.outputs.container }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IP | ${{ github.event.inputs.server_ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Port | ${{ steps.config.outputs.port }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAP Router | ${{ steps.saprouter.outputs.source }} |" >> $GITHUB_STEP_SUMMARY

      # 🔐 Upload client config
      - name: Upload client config
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json \
            --only-show-errors
          echo "✅ Uploaded: ${{ steps.naming.outputs.secret_name }}"

      # 🔐 Upload saprouttab
      - name: Upload saprouttab
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file saprouttab \
            --only-show-errors
          echo "✅ Uploaded: ${{ steps.naming.outputs.router_name }}"

      # 🔐 Upload custom config file (if provided)
      - name: Upload custom config
        if: steps.validate_config.outputs.config_provided == 'true'
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file }}"
          CONFIG_NAME=$(basename "$CONFIG_FILE" | sed 's/\..*//')
          
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ ERROR: File disappeared: $CONFIG_FILE"
            exit 1
          fi
          
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "config-$CONFIG_NAME" \
            --file "$CONFIG_FILE" \
            --only-show-errors
          echo "✅ Uploaded: config-$CONFIG_NAME"

      # 🧹 Cleanup
      - name: Cleanup runner files
        run: |
          rm -f config.json saprouttab
          echo "✅ Cleaned up temporary files"

      # 🔥 Delete sensitive file from repo
      - name: Delete saprouter_temp/saprouttab from repo
        run: |
          FILE="saprouter_temp/saprouttab"

          if [ -f "$FILE" ]; then
            SHA=$(git ls-files -s $FILE | awk '{print $2}')

            if [ -z "$SHA" ]; then
              echo "⚠️ File not tracked in git: $FILE"
              exit 0
            fi

            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/contents/$FILE \
              -d "{
                \"message\": \"remove sensitive saprouter_temp/saprouttab\",
                \"sha\": \"$SHA\",
                \"branch\": \"${{ github.ref_name }}\"
              }"
            echo "✅ Deleted from repo: $FILE"
          else
            echo "ℹ️ File doesn't exist: $FILE"
          fi
