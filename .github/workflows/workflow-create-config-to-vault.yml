name: Upload Config to Azure Key Vault

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: Server name
        required: true

      server_ip:
        description: Server IP
        required: true

      network:
        description: Network
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network

permissions:
  contents: read

jobs:
  upload-config:
    name: Generate + Upload Config
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP"
            exit 1
          fi

      # 🧠 Generate secret name
      - name: Generate secret name
        id: naming
        run: |
          RAW="config-${{ github.event.inputs.server_name }}"
    SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT

      # 📄 Create config JSON
      - name: Create config
        run: |
          jq -n \
            --arg name "${{ github.event.inputs.server_name }}" \
            --arg ip "${{ github.event.inputs.server_ip }}" \
            --arg net "${{ github.event.inputs.network }}" \
            '{
              server_name: $name,
              server_ip: $ip,
              network: $net
            }' > config.json

          cat config.json

      # 🔐 Upload to Key Vault
      - name: Upload to Key Vault
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json

          echo "✅ Uploaded to Key Vault"
