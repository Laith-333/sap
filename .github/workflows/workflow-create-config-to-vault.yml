name: Create Client + SAP Router Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name (e.g. sap, microsoft)"
        required: true
        type: string

      server_ip:
        description: "Container / Server IP address"
        required: true
        type: string

      container_port:
        description: "Container port (1-65535)"
        required: true
        default: "80"
        type: string

      saprouttab:
        description: "Paste SAP Router rules content"
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Validate IP
        shell: bash
        run: |
          set -euo pipefail
          IP="${{ github.event.inputs.server_ip }}"

          if ! [[ "$IP" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "Invalid IP address format"
            exit 1
          fi

          IFS='.' read -r o1 o2 o3 o4 <<< "$IP"
          for octet in "$o1" "$o2" "$o3" "$o4"; do
            if [ "$octet" -lt 0 ] || [ "$octet" -gt 255 ]; then
              echo "Invalid IP address"
              exit 1
            fi
          done

      - name: Validate Port
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ github.event.inputs.container_port }}"
          if ! [[ "$PORT" =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "Invalid port number"
            exit 1
          fi

      - name: Validate saprouttab input
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ github.event.inputs.saprouttab }}" ]; then
            echo "saprouttab input is required"
            exit 1
          fi

      - name: Generate secret names
        id: naming
        shell: bash
        run: |
          set -euo pipefail

          INPUT="${{ github.event.inputs.client_name }}"

          CLEAN=$(echo "$INPUT" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/^client-//' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')

          SECRET_NAME="client-${CLEAN}"
          ROUTER_NAME="saprouttab-${CLEAN}"
          CONTAINER_NAME="container-${CLEAN}"

          echo "secret_name=$SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "router_name=$ROUTER_NAME" >> "$GITHUB_OUTPUT"
          echo "container_name=$CONTAINER_NAME" >> "$GITHUB_OUTPUT"

      - name: Create temp files
        id: files
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_FILE="$(mktemp)"
          ROUTER_FILE="$(mktemp)"

          echo "config_file=$CONFIG_FILE" >> "$GITHUB_OUTPUT"
          echo "router_file=$ROUTER_FILE" >> "$GITHUB_OUTPUT"

      - name: Create config.json
        shell: bash
        run: |
          set -euo pipefail

          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"
          PORT="${{ github.event.inputs.container_port }}"
          CONTAINER="${{ steps.naming.outputs.container_name }}"
          CONFIG_FILE="${{ steps.files.outputs.config_file }}"

          jq -n \
            --arg client "$CLIENT" \
            --arg cname "$CONTAINER" \
            --arg ip "$IP" \
            --arg port "$PORT" \
            '{
              client_name: $client,
              container_name: $cname,
              container_ip: $ip,
              port: $port
            }' > "$CONFIG_FILE"

      - name: Create saprouttab temp file
        shell: bash
        run: |
          set -euo pipefail
          ROUTER_FILE="${{ steps.files.outputs.router_file }}"
          printf '%s\n' "${{ github.event.inputs.saprouttab }}" > "$ROUTER_FILE"

      - name: Upload client config to Key Vault
        shell: bash
        run: |
          set -euo pipefail
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file "${{ steps.files.outputs.config_file }}" \
            --only-show-errors 1>/dev/null

      - name: Upload saprouttab to Key Vault
        shell: bash
        run: |
          set -euo pipefail
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file "${{ steps.files.outputs.router_file }}" \
            --only-show-errors 1>/dev/null

      - name: Write safe summary
        shell: bash
        run: |
          {
            echo "## Configuration uploaded"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Client | ${{ github.event.inputs.client_name }} |"
            echo "| Container | ${{ steps.naming.outputs.container_name }} |"
            echo "| Config secret | ${{ steps.naming.outputs.secret_name }} |"
            echo "| Router secret | ${{ steps.naming.outputs.router_name }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup temp files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          shred -u "${{ steps.files.outputs.config_file }}" 2>/dev/null || rm -f "${{ steps.files.outputs.config_file }}"
          shred -u "${{ steps.files.outputs.router_file }}" 2>/dev/null || rm -f "${{ steps.files.outputs.router_file }}"
