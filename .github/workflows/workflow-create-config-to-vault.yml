name: Create Client + SAP Router Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Container / Server IP Address"
        required: true

      service:
        description: "Service Type (web, db, api)"
        required: true
        default: "web"

      saprouttab:
        description: "SAP Router rules (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP address"
            exit 1
          fi

      # 🧠 Generate secret names
      - name: Generate secret names
        id: naming
        run: |
          INPUT="${{ github.event.inputs.client_name }}"
          CLEAN=$(echo "$INPUT" | sed 's/^client-//')

          SAFE=$(echo "client-$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-$//')

          ROUTER="saprouttab-$CLEAN"

          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER" >> $GITHUB_OUTPUT

      # 📄 Create config.json (REAL DATA)
      - name: Create config.json
        run: |
          CLIENT="${{ github.event.inputs.client_name }}"
          IP="${{ github.event.inputs.server_ip }}"
          SERVICE="${{ github.event.inputs.service }}"

          # Generate container name
          CONTAINER_NAME="container-${CLIENT}-${SERVICE}"

          # Assign port based on service
          if [ "$SERVICE" = "web" ]; then
            PORT=80
          elif [ "$SERVICE" = "api" ]; then
            PORT=8080
          elif [ "$SERVICE" = "db" ]; then
            PORT=5432
          else
            PORT=3000
          fi

          jq -n \
            --arg client "$CLIENT" \
            --arg cname "$CONTAINER_NAME" \
            --arg ip "$IP" \
            --arg port "$PORT" \
            '{
              client_name: $client,
              container_name: $cname,
              container_ip: $ip,
              port: $port
            }' > config.json

          echo "✅ Generated config:"
          cat config.json

      # 🔥 Prepare SAP Router
      - name: Prepare saprouttab
        run: |
          FILE="saprouter_temp/saprouttab"
          INPUT="${{ github.event.inputs.saprouttab }}"
          IP="${{ github.event.inputs.server_ip }}"

          if [ -f "$FILE" ]; then
            echo "✅ Using saprouter_temp/saprouttab"
            cp "$FILE" saprouttab

          elif [ -n "$INPUT" ]; then
            echo "⚠️ Using input from UI"
            echo "$INPUT" > saprouttab

          else
            echo "⚠️ Using default SAP rule"
            echo "P $IP * *" > saprouttab
          fi

          echo "📄 saprouttab content:"
          cat saprouttab

      # 🔐 Upload client config to Key Vault
      - name: Upload client config
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json \
            --only-show-errors

      # 🔐 Upload saprouttab
      - name: Upload saprouttab
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.router_name }}" \
            --file saprouttab \
            --only-show-errors

      # 🧹 Cleanup runner files
      - name: Cleanup runner files
        run: |
          rm -f config.json saprouttab

      # 🔥 DELETE sensitive file from repo
      - name: Delete saprouter_temp/saprouttab from repo
        run: |
          FILE="saprouter_temp/saprouttab"

          if [ -f "$FILE" ]; then
            echo "🧹 Deleting $FILE from repo"

            SHA=$(git ls-files -s $FILE | awk '{print $2}')

            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/contents/$FILE \
              -d "{
                \"message\": \"🔥 remove sensitive saprouter_temp/saprouttab\",
                \"sha\": \"$SHA\",
                \"branch\": \"${{ github.ref_name }}\"
              }"

          else
            echo "No saprouter_temp/saprouttab found"
          fi
