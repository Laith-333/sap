name: Import Client (Secure)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name (e.g. Fontys)"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🧠 Generate names (AUTO)
      - name: Generate secret names
        id: naming
        run: |
          CLIENT="${{ github.event.inputs.client_name }}"

          CLEAN=$(echo "$CLIENT" | sed 's/^client-//')

          CONFIG_NAME="client-$CLEAN"
          ROUTER_NAME="saprouttab-$CLEAN"

          echo "secret_name=$CONFIG_NAME" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER_NAME" >> $GITHUB_OUTPUT

          echo "Using config: $CONFIG_NAME"
          echo "Using router: $ROUTER_NAME"

      # 🔑 Fetch BOTH secrets automatically
      - name: Fetch secrets from Key Vault
        id: fetch
        run: |
          SECRET_NAME="${{ steps.naming.outputs.secret_name }}"
          ROUTER_NAME="${{ steps.naming.outputs.router_name }}"

          echo "🔍 Fetching config: $SECRET_NAME"

          CONFIG=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "$SECRET_NAME" \
            --query value -o tsv)

          if [ -z "$CONFIG" ]; then
            echo "❌ ERROR: Config not found"
            exit 1
          fi

          echo "🔍 Fetching SAP router: $ROUTER_NAME"

          SAPROUTER=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "$ROUTER_NAME" \
            --query value -o tsv 2>/dev/null || echo "")

          if [ -z "$SAPROUTER" ]; then
            echo "⚠️ No SAP router config found (optional)"
            SAPROUTER_FOUND=false
          else
            echo "✅ SAP router config loaded"
            SAPROUTER_FOUND=true
          fi

          # 🔒 Mask everything
          echo "::add-mask::$CONFIG"
          echo "::add-mask::$SAPROUTER"

          # 📤 Export safely
          echo "config<<EOF" >> $GITHUB_OUTPUT
          echo "$CONFIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "saprouttab<<EOF" >> $GITHUB_OUTPUT
          echo "$SAPROUTER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "saprouter_found=$SAPROUTER_FOUND" >> $GITHUB_OUTPUT

      # ✅ Safe confirmation
      - name: Verify
        run: |
          echo "Config loaded ✅"

          if [ "${{ steps.fetch.outputs.saprouter_found }}" = "true" ]; then
            echo "SAP Router loaded ✅"
          else
            echo "SAP Router not found (OK) ⚠️"
          fi
