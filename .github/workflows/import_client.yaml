name: Import Client (Secure)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name (e.g. sap)"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout (optional but safe)
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🧠 Generate secret names
      - name: Generate secret names
        id: naming
        run: |
          RAW="${{ github.event.inputs.client_name }}"
          CLEAN=$(echo "$RAW" | sed 's/^client-//')

          SAFE=$(echo "client-$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-$//')

          ROUTER="saprouttab-$CLEAN"

          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT
          echo "router_name=$ROUTER" >> $GITHUB_OUTPUT

      # 🔑 Fetch secrets securely (NO FILES)
      - name: Fetch secrets from Key Vault
        id: fetch_secrets
        run: |
          SECRET_NAME="${{ steps.naming.outputs.secret_name }}"
          ROUTER_NAME="${{ steps.naming.outputs.router_name }}"

          echo "🔍 Fetching secrets from Azure Key Vault..."

          CONFIG=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "$SECRET_NAME" \
            --query value -o tsv)

          if [ -z "$CONFIG" ]; then
            echo "❌ ERROR: Config not found"
            exit 1
          fi

          SAPROUTER=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "$ROUTER_NAME" \
            --query value -o tsv 2>/dev/null || echo "")

          # 🔒 Mask secrets
          echo "::add-mask::$CONFIG"
          echo "::add-mask::$SAPROUTER"

          # 📤 Export as outputs (multi-line safe)
          echo "config<<EOF" >> $GITHUB_OUTPUT
          echo "$CONFIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "saprouttab<<EOF" >> $GITHUB_OUTPUT
          echo "$SAPROUTER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "✅ Secrets loaded securely"

      # ✅ Confirmation (SAFE - no secret output)
      - name: Verify fetch
        run: |
          echo "Secrets successfully retrieved and stored in memory."
          echo "Ready for next step (OpenShift injection)."
