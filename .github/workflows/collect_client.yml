- name: Fetch config list
  run: |
    echo "🔍 Fetching client configs from Key Vault..."

    az keyvault secret list \
      --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
      --query "[].name" -o tsv > all.txt

    # Filter safely (no crash if empty)
    grep '^config-' all.txt > configs.txt || true

    echo ""
    echo "📋 Available Clients:"
    echo "----------------------"

    if [ ! -s configs.txt ]; then
      echo "❌ No configs found (check naming: config-*)"
    else
      i=1
      while read line; do
        echo "$i) $line"
        i=$((i+1))
      done < configs.txt
    fi

    echo "----------------------"

    # JSON output (safe)
    if [ -s configs.txt ]; then
      jq -R -s -c 'split("\n")[:-1]' configs.txt > configs.json
    else
      echo "[]" > configs.json
    fi

    echo ""
    echo "📦 JSON Output:"
    cat configs.json

    echo ""
    echo "🎯 Dropdown format:"
    echo "----------------------"
    while read line; do
      echo "  - $line"
    done < configs.txt || true
    echo "----------------------"
