name: Export Key Vault Config List

on:
  workflow_dispatch:

jobs:
  export-configs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 📋 Fetch + READ configs ✅
      - name: Fetch full config list
        run: |
          echo "🔍 Fetching configs..."

          az keyvault secret list \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --query "[].name" -o tsv > all.txt

          grep '^config-' all.txt > configs.txt || true

          echo ""
          echo "📋 CLIENT CONFIGS:"
          echo "--------------------------------------------------"
          printf "%-20s %-15s %-20s\n" "CLIENT" "IP" "NETWORK"
          echo "--------------------------------------------------"

          while read secret; do
            [ -z "$secret" ] && continue

            value=$(az keyvault secret show \
              --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
              --name "$secret" \
              --query value -o tsv)

            # Parse JSON
            client=$(echo "$value" | jq -r '.client')
            ip=$(echo "$value" | jq -r '.ip')
            network=$(echo "$value" | jq -r '.network')

            printf "%-20s %-15s %-20s\n" "$client" "$ip" "$network"

          done < configs.txt

          echo "--------------------------------------------------"
