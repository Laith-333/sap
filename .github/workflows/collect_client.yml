name: Create / Update Client Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client Name (existing OR new)"
        required: true

      server_ip:
        description: "Server IP Address"
        required: true

      network:
        description: "Network / Subnet"
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network

      service:
        description: "Service Type"
        required: true
        default: "web"

jobs:
  upload-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 🔥 STEP 1: SHOW CLIENTS FIRST
      - name: Show existing clients
        run: |
          echo ""
          echo "=============================="
          echo "📋 EXISTING CLIENTS"
          echo "=============================="

          az keyvault secret list \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --query "[].name" -o tsv | grep '^client-' || echo "No clients found"

          echo "=============================="

      # 🔍 Validate IP
      - name: Validate IP
        run: |
          IP="${{ github.event.inputs.server_ip }}"
          if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "❌ Invalid IP"
            exit 1
          fi

      # 🧠 Generate safe name
      - name: Generate secret name
        id: naming
        run: |
          RAW="client-${{ github.event.inputs.client_name }}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT

      # 🔥 STEP 2: CHECK EXISTENCE
      - name: Check if client exists
        id: check
        run: |
          NAME="${{ steps.naming.outputs.secret_name }}"

          EXISTS=$(az keyvault secret list \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --query "[?name=='$NAME'] | length(@)")

          if [ "$EXISTS" -gt 0 ]; then
            echo ""
            echo "⚠️ CLIENT EXISTS → WILL UPDATE"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "✅ NEW CLIENT → WILL CREATE"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 📄 Create config
      - name: Create config file
        run: |
          jq -n \
            --arg client "${{ github.event.inputs.client_name }}" \
            --arg ip "${{ github.event.inputs.server_ip }}" \
            --arg net "${{ github.event.inputs.network }}" \
            --arg svc "${{ github.event.inputs.service }}" \
            '{
              client_name: $client,
              server_ip: $ip,
              network: $net,
              service: $svc
            }' > config.json

          echo "Generated config:"
          cat config.json

      # 🔐 Upload
      - name: Upload to Key Vault
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json

          echo "✅ Upload completed"
