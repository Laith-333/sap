name: Export Key Vault Config List

on:
  workflow_dispatch:

jobs:
  export-configs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 📋 Fetch configs
      - name: Fetch config list
        run: |
          echo "🔍 Fetching client configs from Key Vault..."

          az keyvault secret list \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --query "[].name" -o tsv | grep '^config-' > configs.txt

          echo ""
          echo "📋 Available Clients:"
          echo "----------------------"

          i=1
          while read line; do
            echo "$i) $line"
            i=$((i+1))
          done < configs.txt

          echo "----------------------"

          # ✅ Create JSON
          jq -R -s -c 'split("\n")[:-1]' configs.txt > configs.json

          # ✅ Create dropdown-ready format
          echo ""
          echo "🎯 COPY THIS INTO YOUR WORKFLOW:"
          echo "--------------------------------"

          while read line; do
            echo "  - $line"
          done < configs.txt

          echo "--------------------------------"

      # 📦 Upload artifact
      - name: Upload config list
        uses: actions/upload-artifact@v4
        with:
          name: config-list
          path: |
            configs.txt
            configs.json
