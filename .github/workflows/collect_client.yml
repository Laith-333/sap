name: Create / Use Client Config (Key Vault)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose action"
        required: true
        type: choice
        options:
          - create-new
          - use-existing

      client_name:
        description: "Client Name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Server IP (ONLY for new)"
        required: false

      network:
        description: "Network (ONLY for new)"
        required: false
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network

      service:
        description: "Service Type (ONLY for new)"
        required: false
        default: "web"

jobs:
  handle-client:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # 📋 Show existing clients (for reference)
      - name: Show existing clients
        run: |
          echo "=============================="
          echo "📋 EXISTING CLIENTS:"
          echo "=============================="

          az keyvault secret list \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --query "[].name" -o tsv | grep '^client-' || echo "No clients found"

          echo "=============================="

      # 🧠 Generate safe secret name
      - name: Generate secret name
        id: naming
        run: |
          RAW="client-${{ github.event.inputs.client_name }}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          echo "secret_name=$SAFE" >> $GITHUB_OUTPUT

      # 🔥 CORE LOGIC (create OR load)
      - name: Handle mode (create or use)
        run: |
          MODE="${{ github.event.inputs.mode }}"
          SECRET="${{ steps.naming.outputs.secret_name }}"

          echo "Mode selected: $MODE"
          echo "Using secret: $SECRET"

          if [ "$MODE" = "use-existing" ]; then
            echo "📥 Loading existing client config..."

            az keyvault secret show \
              --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
              --name "$SECRET" \
              --query value -o tsv > config.json

            echo "Loaded config:"
            cat config.json

          else
            echo "🆕 Creating new config..."

            # Validate IP (only for new)
            IP="${{ github.event.inputs.server_ip }}"
            if ! [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
              echo "❌ Invalid IP"
              exit 1
            fi

            jq -n \
              --arg client "${{ github.event.inputs.client_name }}" \
              --arg ip "$IP" \
              --arg net "${{ github.event.inputs.network }}" \
              --arg svc "${{ github.event.inputs.service }}" \
              '{
                client_name: $client,
                server_ip: $ip,
                network: $net,
                service: $svc
              }' > config.json

            echo "New config created:"
            cat config.json
          fi

      # 🔐 Upload / Update in Key Vault
      - name: Upload to Key Vault
        run: |
          az keyvault secret set \
            --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
            --name "${{ steps.naming.outputs.secret_name }}" \
            --file config.json

          echo "✅ Config uploaded/updated successfully"
