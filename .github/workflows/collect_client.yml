- name: Fetch full config list
  run: |
    echo "🔍 STEP 1: Get ALL secrets"
    az keyvault secret list \
      --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
      --query "[].name" -o tsv > all.txt

    echo ""
    echo "📄 ALL SECRETS:"
    cat all.txt || echo "❌ No secrets found at all"

    echo ""
    echo "🔍 STEP 2: Filter config-*"
    grep '^config-' all.txt > configs.txt || true

    echo ""
    echo "📄 FILTERED (config-*):"
    cat configs.txt || echo "❌ No matching configs"

    echo ""
    echo "🔍 STEP 3: PRINT TABLE"
    echo "--------------------------------------------------"
    printf "%-20s %-15s %-20s\n" "CLIENT" "IP" "NETWORK"
    echo "--------------------------------------------------"

    if [ ! -s configs.txt ]; then
      echo "❌ NO CONFIG FILES FOUND"
      echo "👉 Your secrets are probably NOT named like: config-sap"
      exit 0
    fi

    while read secret; do
      echo ""
      echo "👉 Reading: $secret"

      value=$(az keyvault secret show \
        --vault-name "${{ secrets.AZURE_VAULT_NAME }}" \
        --name "$secret" \
        --query value -o tsv)

      echo "RAW VALUE:"
      echo "$value"

      # Try parsing
      client=$(echo "$value" | jq -r '.client // "N/A"')
      ip=$(echo "$value" | jq -r '.ip // "N/A"')
      network=$(echo "$value" | jq -r '.network // "N/A"')

      printf "%-20s %-15s %-20s\n" "$client" "$ip" "$network"

    done < configs.txt

    echo "--------------------------------------------------"
