name: Upload Secret to Key Vault (Terraform)

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name (e.g. sap, microsoft)"
        required: true

      server_ip:
        description: "Server IP"
        required: true

      network:
        description: "Network"
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network

jobs:
  terraform:
    name: Upload Config via Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      # ✅ THIS FIXES THE ERROR
      TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 📄 Create config.json
      - name: Create config.json
        run: |
          echo '{
            "client": "${{ github.event.inputs.client_name }}",
            "ip": "${{ github.event.inputs.server_ip }}",
            "network": "${{ github.event.inputs.network }}"
          }' > config.json

          echo "Generated config:"
          cat config.json

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🚀 Init
      - name: Terraform Init
        run: terraform init

      # 🔍 Plan
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="secret_name=config-${{ github.event.inputs.client_name }}" \
            -var="file_path=config.json"

      # 🚀 Apply
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="secret_name=config-${{ github.event.inputs.client_name }}" \
            -var="file_path=config.json"
