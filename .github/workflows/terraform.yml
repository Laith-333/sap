name: Terraform Deploy

on:
  push:
    branches:
      - main

  # 🔥 manual run with inputs
  workflow_dispatch:
    inputs:
      pipelines_config:
        description: "Pipelines secret (optional)"
        required: false
      microsoft_config:
        description: "Microsoft secret (optional)"
        required: false
      jumbo_config:
        description: "Jumbo secret (optional)"
        required: false

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    # 🔐 Azure authentication
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # ✅ FIXED (multiline works)
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="pipelines_config=${{ github.event.inputs.pipelines_config }}" \
            -var="microsoft_config=${{ github.event.inputs.microsoft_config }}" \
            -var="jumbo_config=${{ github.event.inputs.jumbo_config }}"

      # ✅ FIXED (multiline works)
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="pipelines_config=${{ github.event.inputs.pipelines_config }}" \
            -var="microsoft_config=${{ github.event.inputs.microsoft_config }}" \
            -var="jumbo_config=${{ github.event.inputs.jumbo_config }}"
